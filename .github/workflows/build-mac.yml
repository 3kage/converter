name: Build macOS App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build VideoConverter.app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Smoke test app bundle
        run: |
          APP_BIN="dist/VideoConverter.app/Contents/MacOS/VideoConverter"
          FFMPEG="dist/VideoConverter.app/Contents/MacOS/ffmpeg/ffmpeg"
          test -x "$APP_BIN"
          test -x "$FFMPEG"
          "$FFMPEG" -version
          "$FFMPEG" -f lavfi -i testsrc=d=1:s=320x240:r=24 -f null -

      - name: Create zip archive
        run: |
          cp "$GITHUB_WORKSPACE/MAC_ЗАПУСК.txt" dist/
          cp "$GITHUB_WORKSPACE/MAC_INSTALL_EN.txt" dist/
          cd dist
          ditto -c -k --sequesterRsrc --keepParent VideoConverter.app VideoConverter-mac.zip
          zip -u VideoConverter-mac.zip MAC_ЗАПУСК.txt MAC_INSTALL_EN.txt

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: VideoConverter-macOS
          path: dist/VideoConverter-mac.zip
          retention-days: 30
