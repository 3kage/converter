name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install FFmpeg
        run: choco install ffmpeg -y
      - name: GUI smoke test
        shell: pwsh
        run: |
          python -m pip install -e ".[gui]" -q
          python -m pip install -r requirements-dev.txt -q
          python -m converter.gui_smoke
      - name: Build
        shell: pwsh
        run: ./build.ps1
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/VideoConverter -DestinationPath dist/VideoConverter-windows.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/VideoConverter-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh
      - name: Zip
        run: |
          cp "$GITHUB_WORKSPACE/MAC_ЗАПУСК.txt" dist/
          cp "$GITHUB_WORKSPACE/MAC_INSTALL_EN.txt" dist/
          cd dist
          ditto -c -k --sequesterRsrc --keepParent VideoConverter.app VideoConverter-mac.zip
          zip -u VideoConverter-mac.zip MAC_ЗАПУСК.txt MAC_INSTALL_EN.txt
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/VideoConverter-mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Build
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh
      - name: Zip
        run: |
          cd dist
          zip -r VideoConverter-linux.zip VideoConverter
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/VideoConverter-linux.zip

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release-windows/VideoConverter-windows.zip
            artifacts/release-macos/VideoConverter-mac.zip
            artifacts/release-linux/VideoConverter-linux.zip
          generate_release_notes: true
          body: |
            ## macOS — if app shows "damaged" / «повреждено»

            The app is **not broken**. Run in Terminal (adjust path):

            ```bash
            xattr -cr ~/Downloads/VideoConverter.app
            open ~/Downloads/VideoConverter.app
            ```

            Or: Right-click the app → **Open** → **Open**.

            See `MAC_ЗАПУСК.txt` inside the macOS zip.
