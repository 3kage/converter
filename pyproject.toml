[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "video-converter"
version = "2.3.2"
description = "Аналіз та конвертація відеофайлів через FFmpeg"
readme = "requirements.txt"
requires-python = ">=3.10"

[project.scripts]
video-converter = "converter.cli:main"
video-converter-gui = "converter.gui:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["converter*"]
